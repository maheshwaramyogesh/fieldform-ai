services:
  - type: web
    name: fieldform-ai
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: OLLAMA_HOST
        value: http://127.0.0.1:11434
      - key: OLLAMA_MODEL
        value: llama3.2:latest
      - key: OLLAMA_MODELS
        value: /data/ollama
      - key: FIELDFORM_DB_PATH
        value: /data/fieldform.db
    disk:
      name: fieldform-data
      mountPath: /data
      sizeGB: 10
